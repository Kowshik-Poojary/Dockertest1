apiVersion: apps/v1
kind: Deployment

metadata:
  name: campusfit

spec:
  replicas: 2

  selector:
    matchLabels:
      app: campusfit

  template:
    metadata:
      labels:
        app: campusfit

    spec:
      containers:
      - name: campusfit
        image: kowshikpoojary8180/campusfit:latest

        ports:
        - containerPort: 3000

        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: PORT

        - name: APP_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: APP_ENV

        - name: MONGO_URI
          value: mongodb://campusfit_user:campusfit_password@mongodb-service:27017/admin?authSource=admin

        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 10

        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
